project:
  data_dir: data
  atlas_dir: data/cordinatesfile/SEEG_Coordinates
  freesurfer_dir: data/freesurfer_subjects/freesurfer_subjects
  output_dir: outputs/publication_car_reference

design:
  montage: common_average_unipolar
  primary_atlas: AAL
  primary_imf: 4
  connectivity_imfs: [1, 2, 3, 4, 5, 6]
  interpretation: reference_sensitivity
  exclude_stimulated_targets: true

windows:
  pre: [-30.0, -2.0]
  post_duration_sec: 28.0
  pre_stimulation_guard_sec: 2.0
  post_artifact_buffer_sec: 1.0
  stim_end_by_frequency:
    "1": 30.0
    "50": 5.0
  early_sensitivity:
    pre: [-12.0, -2.0]
    post_duration_sec: 10.0

preprocessing:
  min_channels_per_file: 5
  min_car_reference_channels: 5
  demean: true
  notch:
    enabled: true
    freqs: [60.0, 120.0, 180.0]
    q: 30.0
  drift:
    enabled: true
    detrend_when_flagged: true
    slope_iqr_ratio_threshold: 0.5
  noise:
    enabled: true
    flat_mad_epsilon: 1.0e-12
    max_nan_fraction: 0.0
    extreme_peak_to_peak_iqr_factor: 50.0
    line_noise_bandwidth_hz: 1.0

emd:
  max_imfs: 6
  nphases: 4
  imf_index: 3
  smooth_phase: 3
  min_cycles_required: 5
  publication_min_cycles: 5
  max_if_hz: 20.0
  max_if_range_hz: 20.0
  amp_percentile: 10.0

connectivity:
  method: multitaper
  metrics: [imcoh, coh]
  primary_frequency_band_hz: [8.0, 11.0]
  segment_length_sec: 4.0
  n_segments: 7
  faverage: true
  mt_adaptive: false
  n_jobs: 1

spectral:
  welch_nperseg_sec: 4.0
  welch_overlap: 0.5
  total_power_band: [1.0, 120.0]
  frequency_bands:
    delta: [1.0, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta: [13.0, 30.0]
    low_gamma: [30.0, 55.0]
    high_gamma: [65.0, 120.0]

outputs:
  figure_dpi: 300

project:
  name: seeg_waveform
  data_dir: data
  output_dir: outputs/waveform_relaxed

windows:
  pre: [-10.0, 0.0]
  post_duration_sec: 10.0
  post_artifact_buffer_sec: 1.0
  stim_end_by_frequency:
    "1": 30.0
    "50": 5.0

preprocessing:
  min_channels_per_file: 5
  demean: true
  notch:
    enabled: true
    freqs: [60.0, 120.0, 180.0]
    q: 30.0
  drift:
    enabled: true
    detrend_when_flagged: true
    slope_iqr_ratio_threshold: 0.5
  noise:
    enabled: true
    flat_mad_epsilon: 1.0e-12
    max_nan_fraction: 0.0
    extreme_peak_to_peak_iqr_factor: 50.0
    line_noise_bandwidth_hz: 1.0

emd:
  max_imfs: 6
  nphases: 4
  imf_index: 3
  smooth_phase: 3
  min_cycles_required: 3
  publication_min_cycles: 5
  max_if_hz: 20.0
  max_if_range_hz: 20.0
  amp_percentile: 10.0

outputs:
  save_channel_npz: true
  save_cycle_csv: true
  figure_dpi: 300
  top_n_channels: 30

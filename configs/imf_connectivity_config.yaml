project:
  data_dir: data
  output_dir: outputs/imf_connectivity

windows:
  pre: [-10.0, 0.0]
  post_duration_sec: 10.0
  post_artifact_buffer_sec: 1.0
  stim_end_by_frequency:
    "1": 30.0
    "50": 5.0

preprocessing:
  min_channels_per_file: 5
  demean: true
  notch:
    enabled: true
    freqs: [60.0, 120.0, 180.0]
    q: 30.0
  drift:
    enabled: true
    detrend_when_flagged: true
    slope_iqr_ratio_threshold: 0.5
  noise:
    enabled: true
    flat_mad_epsilon: 1.0e-12
    max_nan_fraction: 0.0
    extreme_peak_to_peak_iqr_factor: 50.0
    line_noise_bandwidth_hz: 1.0

emd:
  max_imfs: 6
  nphases: 4
  imf_index: 3
  smooth_phase: 3
  min_cycles_required: 3
  max_if_hz: 100.0
  max_if_range_hz: 100.0
  amp_percentile: 10.0

connectivity:
  imfs: [1, 2, 3, 4, 5, 6]
  epoch_length_sec: 2.0
  epoch_overlap: 0.5
  min_epochs: 4
  coherence:
    nperseg_sec: 1.0

outputs:
  figure_dpi: 300

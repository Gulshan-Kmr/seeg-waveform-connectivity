project:
  data_dir: data
  output_dir: outputs/connectivity

windows:
  pre: [-10.0, 0.0]
  post_duration_sec: 10.0
  post_artifact_buffer_sec: 1.0
  stim_end_by_frequency:
    "1": 30.0
    "50": 5.0

preprocessing:
  min_channels_per_file: 5
  demean: true
  notch:
    enabled: true
    freqs: [60.0, 120.0, 180.0]
    q: 30.0
  drift:
    enabled: true
    detrend_when_flagged: true
    slope_iqr_ratio_threshold: 0.5
  noise:
    enabled: true
    flat_mad_epsilon: 1.0e-12
    max_nan_fraction: 0.0
    extreme_peak_to_peak_iqr_factor: 50.0
    line_noise_bandwidth_hz: 1.0

connectivity:
  seed_mode: stimulated_contacts
  target_mode: nonstimulated_contacts
  epoch_length_sec: 2.0
  epoch_overlap: 0.5
  min_epochs: 4
  frequency_bands:
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta: [13.0, 30.0]
    low_gamma: [30.0, 55.0]
    high_gamma: [65.0, 100.0]
  coherence:
    nperseg_sec: 1.0
  pdc:
    enabled: false
    max_order: 20
    min_samples_per_parameter: 10
    stationarity_alpha: 0.05
    residual_whiteness_alpha: 0.01
    max_pairs_per_file: 5

outputs:
  figure_dpi: 300
